name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev libsqlite3-dev libgdbm-dev \
            libmtdev-dev xclip xsel libjpeg-dev build-essential \
            libltdl-dev lzip
          pip3 install --user --upgrade pip
          pip3 install --user "buildozer==1.5.0" "Cython==0.29.33" "setuptools<58" virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin

          # যদি রিপোজিটরিতে কোনো কারণে spec ফাইল না থাকে তবে তৈরি করবে
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          # ১. অ্যাপের নাম ও লোগো অটো-কনফিগারেশন
          sed -i 's/#\? \?title =.*/title = RuMedia Master/g' buildozer.spec
          sed -i 's/#\? \?icon.filename =.*/icon.filename = %(source.dir)s\/logo.png/g' buildozer.spec

          # ২. ফাইল গ্যালারি ওপেন করার জন্য plyer ও android রিকোয়ারমেন্ট যুক্ত করা
          sed -i 's/#\? \?requirements =.*/requirements = python3,kivy==2.3.0,plyer,android/g' buildozer.spec

          # ৩. মোবাইল মেমোরি অ্যাক্সেস করার সকল পারমিশন ইনজেক্ট করা
          sed -i 's/#\? \?android.permissions =.*/android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, MANAGE_EXTERNAL_STORAGE/g' buildozer.spec

          # ৪. স্ট্যান্ডার্ড বিল্ড সেটিংস এবং এনডিকে (NDK) কনফিগারেশন
          sed -i 's/#\? \?android.api =.*/android.api = 33/g' buildozer.spec
          sed -i 's/#\? \?android.minapi =.*/android.minapi = 21/g' buildozer.spec
          sed -i 's/#\? \?android.ndk =.*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/#\? \?android.enable_androidx =.*/android.enable_androidx = True/g' buildozer.spec
          sed -i 's/#\? \?p4a.branch =.*/p4a.branch = master/g' buildozer.spec
          sed -i 's/#\? \?android.accept_sdk_license =.*/android.accept_sdk_license = True/g' buildozer.spec

          # ক্লিন বিল্ড নিশ্চিত করা
          buildozer android clean
          yes | buildozer -v android debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
