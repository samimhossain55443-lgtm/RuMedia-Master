name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev cmake libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libmtdev-dev xclip xsel libjpeg-dev
          pip3 install --user --upgrade buildozer Cython virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # যদি স্পেক ফাইল না থাকে তবেই নতুন তৈরি হবে
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          
          # লাইসেন্স ও এসডিকে অটো-অ্যাকসেপ্ট নিশ্চিত করার চূড়ান্ত কমান্ড
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          yes | buildozer -v android debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
