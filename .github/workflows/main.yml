name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev cmake libmtdev-dev xclip xsel libjpeg-dev
          pip3 install --user --upgrade "buildozer==1.5.0" "Cython==0.29.33" virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          
          if [ ! -f buildozer.spec ]; then 
            buildozer init
          fi
          
          # অভ্যন্তরীণ কনফ্লিক্ট এড়াতে ফাইল স্তরে সরাসরি পাথ ও ভার্সন ক্লিন সেটআপ
          sed -i 's/#\? \?android.api =.*/android.api = 33/g' buildozer.spec
          sed -i 's/#\? \?android.minapi =.*/android.minapi = 21/g' buildozer.spec
          sed -i 's/#\? \?android.ndk =.*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/#\? \?p4a.branch =.*/p4a.branch = master/g' buildozer.spec
          
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer -v android debug
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
