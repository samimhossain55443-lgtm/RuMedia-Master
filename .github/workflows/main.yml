name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev cmake libmtdev-dev xclip xsel libjpeg-dev
          pip3 install --user --upgrade Cython virtualenv "buildozer<=1.5.0"

      - name: Build APK with Clean Environment
        run: |
          export PATH=$PATH:~/.local/bin
          
          # পুরনো ভাঙা কনফিগারেশন থাকলে তা ডিলিট করে সম্পূর্ণ ফ্রেশ করা
          rm -rf .buildozer/
          rm -f buildozer.spec
          buildozer init
          
          # spec ফাইলের ভেতরে সরাসরি স্টেবল ভার্সনগুলো পুশ করা (যাতে কোনো কনফ্লিক্ট না হয়)
          sed -i 's/#android.api = 33/android.api = 33/g' buildozer.spec
          sed -i 's/#android.minapi = 21/android.minapi = 21/g' buildozer.spec
          sed -i 's/#android.ndk = 25b/android.ndk = 25b/g' buildozer.spec
          
          # লাইসেন্স অটো-অ্যাকসেপ্ট করে ফাইনাল রান
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer -v android debug
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
